name: Security Audit

on:
  push:
    branches: ["main"]
    paths: ["frontend/package-lock.json"]
  pull_request:
    branches: ["main"]
    paths: ["frontend/package-lock.json"]

jobs:
  audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm audit --audit-level=high
